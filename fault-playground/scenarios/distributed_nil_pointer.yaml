scenario:
  name: distributed_nil_pointer
  category: panic
  description: panic occurs in service C but root cause may come from B or D
  trigger:
    type: webhook_alert
    alert_name: ServicePanicHigh
    labels:
      service: svc-c
      auto_analyse: true
  entrypoints:
    - http://gateway:8080/demo/panic?id=bad-user
  observability:
    logs:
      query_template: '{trace_id="${trace_id}"}'
    metrics:
      - process_cpu_seconds_total
      - go_goroutines
    pprof:
      enabled: false
  git:
    base_branch: main
    bug_branch: bug/distributed-nil-pointer
    fix_branch: fix/distributed-nil-pointer
  expected_root_cause:
    service: svc-d
    summary: svc-d strips required profile field before forwarding request
  expected_evidence:
    - panic stack in svc-c
    - missing field log in svc-d
    - diff between bug and fix branch shows missing nil guard or field propagation
  report_contract:
    must_include:
      - symptom
      - impact
      - root_cause
      - evidence
      - fix_suggestion
