scenario:
  name: panic_recovered_but_error_rate_high
  category: engineering
  description: recovered panic hides crash while error rate increases
  trigger:
    type: webhook_alert
    alert_name: ServiceErrorRateHigh
    labels:
      service: svc-c
      auto_analyse: true
  entrypoints:
    - http://gateway:8080/demo/recovered-panic?id=bad-user
  observability:
    logs:
      query_template: '{trace_id="${trace_id}"}'
    metrics:
      - http_server_requests_errors_total
      - http_server_request_duration_seconds
  git:
    base_branch: main
    bug_branch: bug/panic-recovered-error-rate-high
    fix_branch: fix/panic-recovered-error-rate-high
  report_contract:
    must_include:
      - symptom
      - impact
      - root_cause
      - evidence
      - fix_suggestion
